<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glows -->
  <circle cx="200" cy="315" r="280" fill="url(#glow1)"/>
  <circle cx="1000" cy="315" r="280" fill="url(#glow2)"/>

  <!-- Grid sutil -->
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Círculos decorativos -->
  <circle cx="150" cy="150" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="1050" cy="480" r="12" fill="#00d4ff" opacity="0.2"/>

  <!-- Ícone: Lista com checkmarks -->
  <g transform="translate(600, 210)">
    <!-- Caixa -->
    <rect x="-70" y="-50" width="140" height="100" rx="12" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.5"/>
    
    <!-- Itens da lista -->
    <g fill="#a0a0c0">
      <rect x="-45" y="-30" width="80" height="6" rx="3" opacity="0.6"/>
      <rect x="-45" y="-10" width="80" height="6" rx="3" opacity="0.6"/>
      <rect x="-45" y="10" width="60" height="6" rx="3" opacity="0.6"/>
      <rect x="-45" y="30" width="70" height="6" rx="3" opacity="0.6"/>
    </g>
    
    <!-- Checkmarks -->
    <g stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-55" y1="-27" x2="-50" y2="-22"/>
      <line x1="-50" y1="-22" x2="-40" y2="-32"/>
      <line x1="-55" y1="-7" x2="-50" y2="-2"/>
      <line x1="-50" y1="-2" x2="-40" y2="-12"/>
    </g>
  </g>

  <!-- Título -->
  <text x="80" y="380" font-family="Montserrat, system-ui, sans-serif" font-size="46" font-weight="700" fill="#ffffff">
    7 ferramentas de
  </text>
  <text x="80" y="440" font-family="Montserrat, system-ui, sans-serif" font-size="46" font-weight="700" fill="#ffffff">
    automação para PME
  </text>

  <!-- Subtítulo -->
  <text x="80" y="490" font-family="Montserrat, system-ui, sans-serif" font-size="18" font-weight="400" fill="#a0a0c0">
    Testadas e aprovadas — desde R$ 0 até valores acessíveis
  </text>

  <!-- Linha divisória -->
  <rect x="80" y="520" width="60" height="3" rx="1.5" fill="url(#accent2)"/>

  <!-- Footer -->
  <text x="80" y="580" font-family="Montserrat, system-ui, sans-serif" font-size="12" fill="#404070" letter-spacing="3">
    AH DIGITAL BLOG
  </text>
</svg>
