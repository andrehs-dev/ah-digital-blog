<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2ff7"/>
      <stop offset="100%" stop-color="#f73b2f"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7b2ff7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="250" cy="250" r="320" fill="url(#glow1)"/>
  <circle cx="950" cy="400" r="280" fill="url(#glow2)"/>
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  <!-- Notion-style page icon -->
  <g transform="translate(80, 130)">
    <rect x="0" y="0" width="70" height="80" rx="6" fill="#ffffff" opacity="0.1"/>
    <rect x="0" y="0" width="70" height="80" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
    <rect x="12" y="12" width="46" height="8" rx="4" fill="#00d4ff"/>
    <rect x="12" y="28" width="46" height="4" rx="2" fill="#ffffff" opacity="0.3"/>
    <circle cx="16" cy="44" r="4" fill="#7b2ff7"/>
    <rect x="26" y="42" width="32" height="4" rx="2" fill="#ffffff" opacity="0.3"/>
    <circle cx="16" cy="56" r="4" fill="#f7972f"/>
    <rect x="26" y="54" width="30" height="4" rx="2" fill="#ffffff" opacity="0.3"/>
    <rect x="12" y="66" width="20" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
  </g>
  <!-- AI icon/robot -->
  <g transform="translate(990, 140)" opacity="0.15">
    <rect x="0" y="0" width="60" height="60" rx="12" fill="#7b2ff7"/>
    <circle cx="30" cy="22" r="10" fill="#0f0f23"/>
    <rect x="15" y="36" width="30" height="8" rx="4" fill="#0f0f23"/>
    <rect x="8" y="44" width="12" height="3" rx="1.5" fill="#0f0f23"/>
    <rect x="40" y="44" width="12" height="3" rx="1.5" fill="#0f0f23"/>
  </g>
  <!-- Título principal -->
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">Notion + IA:</text>
  <text x="80" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="url(#accent)" letter-spacing="-1">Sistema de Produtividade</text>
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1">Completo</text>
  <!-- Subtítulo -->
  <text x="80" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a0a0b8" letter-spacing="-0.3">Como montar seu segundo cérebro com Notion e inteligência artificial</text>
  <!-- Tags -->
  <rect x="80" y="500" width="90" height="30" rx="15" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <text x="125" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#00d4ff" fill-opacity="0.8" text-anchor="middle">Notion</text>
  <rect x="182" y="500" width="60" height="30" rx="15" stroke="#7b2ff7" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <text x="212" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#7b2ff7" fill-opacity="0.8" text-anchor="middle">IA</text>
  <rect x="254" y="500" width="100" height="30" rx="15" stroke="#f7972f" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <text x="304" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#f7972f" fill-opacity="0.8" text-anchor="middle">Produtividade</text>
  <!-- Logo marca d'água -->
  <text x="1120" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.15" text-anchor="end">AH Digital</text>
  <!-- Ícone decorativo -->
  <g transform="translate(860, 370)" opacity="0.2">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#00d4ff"/>
    <rect x="10" y="10" width="30" height="30" rx="4" fill="#0f0f23"/>
    <circle cx="20" cy="20" r="3" fill="#00d4ff"/>
    <circle cx="30" cy="20" r="3" fill="#00d4ff"/>
    <circle cx="25" cy="30" r="3" fill="#00d4ff"/>
  </g>
</svg>
