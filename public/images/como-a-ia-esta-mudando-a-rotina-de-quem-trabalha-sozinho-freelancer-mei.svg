<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="300" cy="300" r="350" fill="url(#glow1)"/>
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  <!-- Ícone: usuário solo + IA -->
  <g transform="translate(600, 190)">
    <circle cx="0" cy="-15" r="22" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    <path d="M-35,35 C-35,10 35,10 35,35" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="-15" r="8" fill="url(#accent)" opacity="0.3"/>
    <text x="0" y="5" font-family="Montserrat, system-ui, sans-serif" font-size="32" font-weight="800" text-anchor="middle" fill="url(#accent)">+IA</text>
  </g>
  <text x="80" y="380" font-family="Montserrat, system-ui, sans-serif" font-size="48" font-weight="700" fill="#ffffff">
    Como a IA Está Mudando
  </text>
  <text x="80" y="440" font-family="Montserrat, system-ui, sans-serif" font-size="48" font-weight="700" fill="#ffffff">
    a Rotina de Quem Trabalha Sozinho
  </text>
  <text x="80" y="495" font-family="Montserrat, system-ui, sans-serif" font-size="22" font-weight="400" fill="#a0a0c0">
    Freelancers e MEIs estão usando IA pra fazer mais com menos
  </text>
  <rect x="80" y="525" width="60" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="80" y="575" font-family="Montserrat, system-ui, sans-serif" font-size="12" fill="#404070" letter-spacing="3">AH DIGITAL BLOG</text>
</svg>
