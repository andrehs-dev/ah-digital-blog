<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="250" cy="250" r="300" fill="url(#glow1)"/>
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  <!-- Ícone: checklist / relógio -->
  <g transform="translate(600, 220)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.5"/>
    <text x="0" y="5" font-family="Montserrat, system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="url(#accent)">AH</text>
  </g>
  <text x="80" y="390" font-family="Montserrat, system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
    10 Dicas de
  </text>
  <text x="80" y="455" font-family="Montserrat, system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
    Produtividade
  </text>
  <text x="80" y="510" font-family="Montserrat, system-ui, sans-serif" font-size="22" font-weight="400" fill="#a0a0c0">
    Para programadores em 2026
  </text>
  <rect x="80" y="540" width="60" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="80" y="585" font-family="Montserrat, system-ui, sans-serif" font-size="12" fill="#404070" letter-spacing="3">AH DIGITAL BLOG</text>
