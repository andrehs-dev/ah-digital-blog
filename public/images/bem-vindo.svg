<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <g opacity="0.03">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

  <circle cx="1050" cy="100" r="80" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.12"/>
  <circle cx="150" cy="550" r="60" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.1"/>

  <!-- Logo AH estilizado -->
  <g transform="translate(180, 315)">
    <rect x="-45" y="-45" width="90" height="90" rx="10" fill="#00d4ff" opacity="0.1"/>
    <text x="-10" y="12" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="46" font-weight="bold" fill="#00d4ff">A</text>
    <text x="18" y="12" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="46" font-weight="bold" fill="#7b2ff7">H</text>
  </g>

  <text x="600" y="260" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">
    Bem-vindo ao
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="52" font-weight="bold" fill="url(#accent)">
    AH Digital Blog
  </text>

  <text x="600" y="400" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="22" fill="#a0a0c0">
    Tecnologia, carreira digital e produtividade real
  </text>

  <line x1="480" y1="440" x2="720" y2="440" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>

  <text x="600" y="490" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="18" fill="#6060a0">
    Sem promessas. Sem hype. Só o que funciona.
  </text>

  <rect x="450" y="550" width="300" height="1.5" rx="0.75" fill="url(#accent)" opacity="0.3"/>
  <text x="600" y="585" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" fill="#404070" letter-spacing="2">
    AH DIGITAL SOLUTIONS
  </text>
</svg>
