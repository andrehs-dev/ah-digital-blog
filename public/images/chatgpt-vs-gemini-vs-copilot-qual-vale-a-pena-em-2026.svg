<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="chatgpt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10a37f"/>
      <stop offset="100%" style="stop-color:#0d8a6e"/>
    </linearGradient>
    <linearGradient id="gemini" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4"/>
      <stop offset="50%" style="stop-color:#34a853"/>
      <stop offset="100%" style="stop-color:#ea4335"/>
    </linearGradient>
    <linearGradient id="copilot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#005a9e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="600" y="180" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-1">
    ChatGPT vs Gemini vs Copilot
  </text>
  <text x="600" y="250" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="28" font-weight="600">
    Qual Vale a Pena em 2026?
  </text>

  <!-- Cards -->
  <!-- ChatGPT -->
  <rect x="60" y="320" width="320" height="240" rx="16" fill="#1e293b" stroke="#10a37f" stroke-width="2" opacity="0.95"/>
  <rect x="60" y="320" width="320" height="60" rx="16" fill="url(#chatgpt)" opacity="0.9"/>
  <rect x="60" y="350" width="320" height="30" fill="url(#chatgpt)" opacity="0.9"/>
  <text x="220" y="356" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">ChatGPT</text>
  <text x="220" y="390" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">OpenAI</text>

  <text x="85" y="420" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Grátis — Bom pra começar</text>
  <text x="85" y="445" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Plus: US$ 20/mês</text>
  <text x="85" y="468" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Melhor custo-benefício</text>
  <text x="85" y="493" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Pro: US$ 100-200/mês</text>
  <text x="85" y="516" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Uso profissional pesado</text>
  <text x="85" y="540" fill="#10a37f" font-family="system-ui, sans-serif" font-size="12" font-weight="600">★ Melhor para: texto, código geral</text>

  <!-- Gemini -->
  <rect x="440" y="320" width="320" height="240" rx="16" fill="#1e293b" stroke="#4285f4" stroke-width="2" opacity="0.95"/>
  <rect x="440" y="320" width="320" height="60" rx="16" fill="url(#gemini)" opacity="0.9"/>
  <rect x="440" y="350" width="320" height="30" fill="url(#gemini)" opacity="0.9"/>
  <text x="600" y="356" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Gemini</text>
  <text x="600" y="390" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">Google</text>

  <text x="465" y="420" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Grátis — Gera limite diário generoso</text>
  <text x="465" y="445" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Plus: US$ 4,99/mês</text>
  <text x="465" y="468" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Armazenam + vídeo</text>
  <text x="465" y="493" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Pro: US$ 19,99/mês</text>
  <text x="465" y="516" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">YouTube Lite + 5TB inclusos</text>
  <text x="465" y="540" fill="#4285f4" font-family="system-ui, sans-serif" font-size="12" font-weight="600">★ Melhor para: pesquisa, docs longos</text>

  <!-- Copilot -->
  <rect x="820" y="320" width="320" height="240" rx="16" fill="#1e293b" stroke="#0078d4" stroke-width="2" opacity="0.95"/>
  <rect x="820" y="320" width="320" height="60" rx="16" fill="url(#copilot)" opacity="0.9"/>
  <rect x="820" y="350" width="320" height="30" fill="url(#copilot)" opacity="0.9"/>
  <text x="980" y="356" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">Copilot</text>
  <text x="980" y="390" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14">Microsoft</text>

  <text x="845" y="420" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Grátis — Incluído no Windows</text>
  <text x="845" y="445" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Pro: US$ 20/mês</text>
  <text x="845" y="468" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Office integrado</text>
  <text x="845" y="493" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Bus: US$ 30/usuário/mês</text>
  <text x="845" y="516" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Dados da sua empresa</text>
  <text x="845" y="540" fill="#0078d4" font-family="system-ui, sans-serif" font-size="12" font-weight="600">★ Melhor para: Office, empresas</text>

  <!-- VS Badge -->
  <text x="600" y="310" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="14" font-weight="700">⚡ COMPARATIVO COMPLETO</text>

  <!-- Footer -->
  <text x="600" y="605" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="12">AH Digital Solutions — ahdigital.blog</text>
</svg>
