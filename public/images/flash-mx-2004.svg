<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="flashRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="flashGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ff4500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glows -->
  <circle cx="600" cy="315" r="350" fill="url(#flashGlow)"/>
  <circle cx="200" cy="500" r="200" fill="url(#cyanGlow)"/>

  <!-- Grid lines (retro timeline feel) -->
  <line x1="50" y1="530" x2="1150" y2="530" stroke="#00d4ff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="50" y1="480" x2="1150" y2="480" stroke="#00d4ff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="50" y1="430" x2="1150" y2="430" stroke="#00d4ff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Floating keyframe dots -->
  <circle cx="150" cy="530" r="4" fill="#ff4500" opacity="0.6"/>
  <circle cx="350" cy="530" r="4" fill="#ff4500" opacity="0.6"/>
  <circle cx="450" cy="530" r="4" fill="#ff4500" opacity="0.6"/>
  <circle cx="750" cy="530" r="4" fill="#ff4500" opacity="0.6"/>
  <circle cx="850" cy="530" r="4" fill="#ff4500" opacity="0.6"/>
  <circle cx="1050" cy="530" r="4" fill="#ff4500" opacity="0.6"/>

  <!-- Keyframe boxes (timeline markers) -->
  <rect x="250" y="525" width="12" height="10" rx="2" fill="#00d4ff" opacity="0.4"/>
  <rect x="550" y="525" width="12" height="10" rx="2" fill="#7b2ff7" opacity="0.4"/>
  <rect x="650" y="525" width="12" height="10" rx="2" fill="#00d4ff" opacity="0.4"/>
  <rect x="950" y="525" width="12" height="10" rx="2" fill="#7b2ff7" opacity="0.4"/>

  <!-- Big logo area - Stylized Flash bolt -->
  <g transform="translate(220, 140)">
    <!-- Outer circle -->
    <circle cx="80" cy="80" r="78" stroke="url(#flashRed)" stroke-width="3" fill="none" opacity="0.3"/>
    <!-- Bolt shape -->
    <path d="M65 40 L110 40 L85 85 L105 85 L50 130 L60 85 L40 85 Z"
          fill="url(#flashRed)" filter="url(#neon)"/>
  </g>

  <!-- Title -->
  <text x="600" y="150" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#ff6b35" opacity="0.7" letter-spacing="4">MACROMEDIA</text>
  <text x="600" y="210" text-anchor="middle" font-family="'Impact', sans-serif" font-size="64" fill="url(#accent)" letter-spacing="2">FLASH MX 2004</text>
  <text x="600" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" fill="#888" letter-spacing="6">✦</text>

  <!-- Subtitle line -->
  <text x="600" y="320" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#a0a0b8" letter-spacing="2">O SOFTWARE QUE CONSTRUIU A INTERNET</text>
  <text x="600" y="350" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#666" letter-spacing="1">2003 — 2006 • ERA DE OURO DA WEB</text>

  <!-- Decorative line -->
  <line x1="350" y1="380" x2="850" y2="380" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>

  <!-- Bottom feature icons - retro web elements -->
  <!-- Animation -->
  <g transform="translate(300, 430)">
    <rect x="-20" y="-20" width="40" height="40" rx="4" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="18" fill="#ff6b35" opacity="0.8">▶</text>
    <text x="0" y="40" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#666">ANIMAÇÃO</text>
  </g>

  <!-- Games -->
  <g transform="translate(480, 430)">
    <rect x="-20" y="-20" width="40" height="40" rx="4" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="18" fill="#00d4ff" opacity="0.8">◆</text>
    <text x="0" y="40" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#666">JOGOS</text>
  </g>

  <!-- Interactivity -->
  <g transform="translate(660, 430)">
    <rect x="-20" y="-20" width="40" height="40" rx="4" fill="none" stroke="#7b2ff7" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="18" fill="#7b2ff7" opacity="0.8">↗</text>
    <text x="0" y="40" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#666">INTERATIVIDADE</text>
  </g>

  <!-- Video -->
  <g transform="translate(840, 430)">
    <rect x="-20" y="-20" width="40" height="40" rx="4" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="18" fill="#ff6b35" opacity="0.8">►</text>
    <text x="0" y="40" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#666">VÍDEO</text>
  </g>

  <!-- Retro decorative corner brackets -->
  <path d="M 30 30 L 30 80 M 30 30 L 80 30" stroke="#ff6b35" stroke-width="2" opacity="0.2" fill="none"/>
  <path d="M 1170 30 L 1170 80 M 1170 30 L 1120 30" stroke="#ff6b35" stroke-width="2" opacity="0.2" fill="none"/>
  <path d="M 30 600 L 30 550 M 30 600 L 80 600" stroke="#ff6b35" stroke-width="2" opacity="0.2" fill="none"/>
  <path d="M 1170 600 L 1170 550 M 1170 600 L 1120 600" stroke="#ff6b35" stroke-width="2" opacity="0.2" fill="none"/>

  <!-- ah.digital blog signature -->
  <text x="1120" y="600" text-anchor="end" font-family="'Courier New', monospace" font-size="12" fill="#444" letter-spacing="2">AH.DIGITAL</text>
</svg>
