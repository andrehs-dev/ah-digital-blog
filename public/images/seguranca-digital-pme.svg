<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="280" r="200" fill="url(#shieldGrad)"/>
  
  <!-- Shield icon -->
  <g transform="translate(600, 270)">
    <path d="M0 -90 L90 -60 L90 30 Q90 100 0 130 Q-90 100 -90 30 L-90 -60 Z" 
          fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
    <path d="M0 -70 L70 -45 L70 25 Q70 80 0 110 Q-70 80 -70 25 L-70 -45 Z" 
          fill="url(#accent)" opacity="0.08"/>
    <!-- Checkmark inside shield -->
    <path d="M-25 20 L-5 45 L30 0" stroke="#00d4ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  </g>
  
  <!-- Lock elements -->
  <g transform="translate(350, 420)" opacity="0.3">
    <rect x="-15" y="0" width="30" height="25" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <path d="M-8 -5 Q-8 -18 0 -18 Q8 -18 8 -5" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  </g>
  <g transform="translate(850, 420)" opacity="0.3">
    <rect x="-15" y="0" width="30" height="25" rx="3" fill="none" stroke="#7b2ff7" stroke-width="1.5"/>
    <path d="M-8 -5 Q-8 -18 0 -18 Q8 -18 8 -5" fill="none" stroke="#7b2ff7" stroke-width="1.5"/>
  </g>
  
  <!-- Data nodes -->
  <circle cx="250" cy="300" r="4" fill="#00d4ff" opacity="0.3"/>
  <circle cx="950" cy="300" r="4" fill="#7b2ff7" opacity="0.3"/>
  <circle cx="300" cy="200" r="3" fill="#00d4ff" opacity="0.2"/>
  <circle cx="900" cy="200" r="3" fill="#7b2ff7" opacity="0.2"/>
  
  <text x="600" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" opacity="0.5" letter-spacing="6">SEGURANÇA</text>
  <text x="600" y="470" text-anchor="middle" font-family="'Impact', sans-serif" font-size="46" fill="url(#accent)" letter-spacing="2">SEGURANÇA DIGITAL</text>
  <text x="600" y="515" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#888" letter-spacing="4">PARA PEQUENOS NEGÓCIOS</text>
  <line x1="300" y1="545" x2="900" y2="545" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Bottom tags -->
  <text x="400" y="575" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#555" letter-spacing="2">SENHAS</text>
  <text x="600" y="575" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#555" letter-spacing="2">BACKUP</text>
  <text x="800" y="575" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#555" letter-spacing="2">2FA</text>
</svg>
