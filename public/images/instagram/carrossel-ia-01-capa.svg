<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="300" fill="#3b82f6" opacity="0.05"/>
  <circle cx="880" cy="800" r="250" fill="#8b5cf6" opacity="0.05"/>
  
  <!-- Neural network decoration -->
  <g opacity="0.3">
    <circle cx="540" cy="350" r="40" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="460" cy="280" r="20" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="620" cy="280" r="20" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="540" y1="350" x2="460" y2="280" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <line x1="540" y1="350" x2="620" y2="280" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <line x1="460" y1="280" x2="620" y2="280" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
    <circle cx="540" cy="350" r="6" fill="#3b82f6"><animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="460" cy="280" r="4" fill="#8b5cf6"><animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="280" r="4" fill="#06b6d4"><animate attributeName="r" values="4;7;4" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <text x="540" y="600" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="url(#title)" text-anchor="middle" letter-spacing="-2">IA GENERATIVA</text>
  <text x="540" y="680" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="url(#title)" text-anchor="middle" letter-spacing="-2">EM 2026</text>
  
  <text x="540" y="780" font-family="system-ui, sans-serif" font-size="28" fill="#60a5fa" text-anchor="middle" opacity="0.8">O que é e como está mudando tudo</text>

  <text x="540" y="920" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" opacity="0.15" letter-spacing="4">AH DIGITAL BLOG</text>
</svg>
