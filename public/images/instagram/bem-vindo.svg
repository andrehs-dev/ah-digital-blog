<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  
  <g opacity="0.03">
    <line x1="0" y1="180" x2="1080" y2="180" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1080" y2="360" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="540" x2="1080" y2="540" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="720" x2="1080" y2="720" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="900" x2="1080" y2="900" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

  <circle cx="900" cy="180" r="80" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.1"/>

  <!-- Logo AH -->
  <g transform="translate(540, 290)">
    <rect x="-50" y="-50" width="100" height="100" rx="12" fill="url(#accent)" opacity="0.1"/>
    <text x="-12" y="15" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="58" font-weight="bold" fill="#00d4ff">A</text>
    <text x="18" y="15" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="58" font-weight="bold" fill="#7b2ff7">H</text>
  </g>

  <text x="540" y="500" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff">
    Bem-vindo ao
  </text>
  <text x="540" y="580" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="60" font-weight="bold" fill="url(#accent)">
    AH Digital Blog
  </text>

  <text x="540" y="660" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="26" fill="#a0a0c0">
    Tecnologia, carreira e produtividade
  </text>

  <line x1="440" y1="700" x2="640" y2="700" stroke="url(#accent)" stroke-width="1.5" opacity="0.35"/>

  <g transform="translate(220, 780)" font-family="Montserrat, Arial, sans-serif" font-size="26" fill="#c0c0e0">
    <text x="0" y="0">🤖 IA e ferramentas reais</text>
    <text x="0" y="50">📈 Carreira digital sem filtro</text>
    <text x="0" y="100">⚡ Produtividade que funciona</text>
  </g>

  <rect x="390" y="960" width="300" height="1.5" rx="0.75" fill="url(#accent)" opacity="0.3"/>
  <text x="540" y="1000" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" fill="#404070" letter-spacing="2">
    @ANDREHS.DEV
  </text>
</svg>
