    <circle cx="25" cy="-18" r="10" fill="none" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="22" r="10" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="-25" y1="-18" x2="25" y2="-18" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="-25" y1="-18" x2="0" y2="22" stroke="#7b2ff7" stroke-width="1.5" opacity="0.4"/>
    <line x1="25" y1="-18" x2="0" y2="22" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  </g>
  <text x="60" y="640" font-family="Montserrat, system-ui, sans-serif" font-size="50" font-weight="700" fill="#ffffff">
