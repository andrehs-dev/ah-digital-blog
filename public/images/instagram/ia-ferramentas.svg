    <linearGradient id="glow1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="300" cy="300" r="350" fill="url(#glow1)"/>
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="180" x2="1080" y2="180"/>
    <line x1="0" y1="360" x2="1080" y2="360"/>
    <line x1="0" y1="540" x2="1080" y2="540"/>
    <line x1="0" y1="720" x2="1080" y2="720"/>
