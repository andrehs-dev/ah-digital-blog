  <rect x="60" y="870" width="60" height="4" rx="2" fill="url(#accent)"/>
  <text x="60" y="1020" font-family="Montserrat, system-ui, sans-serif" font-size="14" fill="#404070" letter-spacing="3">@ANDREHS.DEV</text>
