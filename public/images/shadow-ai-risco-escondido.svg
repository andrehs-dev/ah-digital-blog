<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bar1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="bar2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bar3Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7c3aed" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top decorative line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="url(#accentGrad)" stroke-width="4"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="80" r="200" fill="#7c3aed" opacity="0.05"/>
  <circle cx="150" cy="500" r="150" fill="#22d3ee" opacity="0.04"/>

  <!-- Decorative lines -->
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#7c3aed" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#22d3ee" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#22d3ee" stroke-width="1" opacity="0.04"/>

  <!-- Mini decorative dots -->
  <circle cx="50" cy="50" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="1150" cy="50" r="3" fill="#22d3ee" opacity="0.4"/>
  <circle cx="1150" cy="580" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="50" cy="580" r="3" fill="#22d3ee" opacity="0.4"/>

  <!-- Tag badge -->
  <rect x="60" y="60" width="130" height="32" rx="16" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.8"/>
  <text x="125" y="80" text-anchor="middle" font-family="monospace" font-size="13" fill="#22d3ee" font-weight="bold" letter-spacing="2">SEGURANÇA</text>

  <!-- Logo AH -->
  <text x="1080" y="80" font-family="monospace" font-size="28" fill="#7c3aed" font-weight="bold" letter-spacing="4" text-anchor="end">AH</text>

  <!-- Title -->
  <text x="60" y="170" font-family="system-ui, sans-serif" font-size="44" fill="#ffffff" font-weight="700" letter-spacing="-0.5">
    <tspan x="60" dy="0">Shadow AI: o risco</tspan>
    <tspan x="60" dy="55" fill="#22d3ee">escondido que pode estar</tspan>
    <tspan x="60" dy="55">vazando dados da</tspan>
    <tspan x="60" dy="55">sua empresa</tspan>
  </text>

  <!-- Mini data visualization - Bar chart -->
  <g transform="translate(60, 380)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#94a3b8" font-weight="bold">DADOS DO MERCADO</text>
    
    <!-- Bar 1: 78% -->
    <rect x="0" y="18" width="280" height="30" rx="3" fill="#1e0a3c" stroke="#7c3aed" stroke-width="0.5"/>
    <rect x="0" y="18" width="218" height="30" rx="3" fill="url(#bar1Grad)" opacity="0.85"/>
    <text x="10" y="37" font-family="monospace" font-size="12" fill="#ffffff" font-weight="bold">78%</text>
    <text x="100" y="37" font-family="monospace" font-size="11" fill="#cbd5e1">Funcionários usam IA não autorizada</text>

    <!-- Bar 2: 65% -->
    <rect x="0" y="56" width="280" height="30" rx="3" fill="#1e0a3c" stroke="#22d3ee" stroke-width="0.5"/>
    <rect x="0" y="56" width="182" height="30" rx="3" fill="url(#bar2Grad)" opacity="0.85"/>
    <text x="10" y="75" font-family="monospace" font-size="12" fill="#ffffff" font-weight="bold">65%</text>
    <text x="100" y="75" font-family="monospace" font-size="11" fill="#cbd5e1">Incidentes envolvem dados pessoais</text>

    <!-- Bar 3: 87% -->
    <rect x="0" y="94" width="280" height="30" rx="3" fill="#1e0a3c" stroke="#f59e0b" stroke-width="0.5"/>
    <rect x="0" y="94" width="244" height="30" rx="3" fill="url(#bar3Grad)" opacity="0.85"/>
    <text x="10" y="113" font-family="monospace" font-size="12" fill="#ffffff" font-weight="bold">87%</text>
    <text x="100" y="113" font-family="monospace" font-size="11" fill="#cbd5e1">Empresas sem detecção de Shadow AI</text>
  </g>

  <!-- Source note for chart -->
  <text x="60" y="520" font-family="monospace" font-size="9" fill="#64748b">Fontes: MyDataGent 2026 · Technology Radius 2024-2026 · Cisco 2025</text>

  <!-- Date -->
  <text x="60" y="555" font-family="monospace" font-size="12" fill="#64748b">AH Digital · 20 de junho de 2026</text>

  <!-- Decorative corner line -->
  <line x1="1100" y1="500" x2="1140" y2="500" stroke="#7c3aed" stroke-width="2" opacity="0.3"/>
  <line x1="1140" y1="500" x2="1140" y2="540" stroke="#22d3ee" stroke-width="2" opacity="0.3"/>
</svg>
