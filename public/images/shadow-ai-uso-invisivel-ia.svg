<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="#6366f1" opacity="0.08"/>
  <circle cx="1100" cy="150" r="100" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="100" cy="500" r="120" fill="#6366f1" opacity="0.06"/>

  <!-- Brain/eye icon (center) -->
  <g transform="translate(600, 220)" filter="url(#glow)">
    <!-- Outer ring -->
    <ellipse cx="0" cy="0" rx="70" ry="70" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.6"/>
    <!-- Inner -->
    <ellipse cx="0" cy="0" rx="45" ry="45" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="18" fill="#6366f1" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="#a78bfa" opacity="0.9"/>
    
    <!-- Radar arcs -->
    <path d="M -70 0 A 70 70 0 0 1 0 -70" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 0 70 A 70 70 0 0 1 70 0" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M -50 -50 A 70 70 0 0 1 50 -50" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M -50 50 A 70 70 0 0 1 50 50" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.3"/>
    
    <!-- Small dots around -->
    <circle cx="-85" cy="-30" r="3" fill="#818cf8" opacity="0.5"/>
    <circle cx="80" cy="25" r="3" fill="#818cf8" opacity="0.5"/>
    <circle cx="-65" cy="55" r="2.5" fill="#818cf8" opacity="0.4"/>
    <circle cx="55" cy="-65" r="2.5" fill="#818cf8" opacity="0.4"/>
    <circle cx="-20" cy="-80" r="2" fill="#818cf8" opacity="0.3"/>
    <circle cx="30" cy="75" r="2" fill="#818cf8" opacity="0.3"/>
  </g>

  <!-- Data nodes connected to brain -->
  <g opacity="0.4">
    <!-- Node 1 -->
    <line x1="530" y1="200" x2="350" y2="120" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <circle cx="340" cy="115" r="10" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="340" cy="115" r="3" fill="#818cf8"/>
    <!-- Node 2 -->
    <line x1="670" y1="200" x2="850" y2="120" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <circle cx="860" cy="115" r="10" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="860" cy="115" r="3" fill="#818cf8"/>
    <!-- Node 3 -->
    <line x1="530" y1="240" x2="300" y2="320" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <circle cx="290" cy="325" r="10" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="290" cy="325" r="3" fill="#818cf8"/>
    <!-- Node 4 -->
    <line x1="670" y1="240" x2="900" y2="320" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
    <circle cx="910" cy="325" r="10" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="910" cy="325" r="3" fill="#818cf8"/>
  </g>

  <!-- Warning triangle -->
  <g transform="translate(340, 115)" filter="url(#shadow)">
    <polygon points="0,-15 12,10 -12,10" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <text x="0" y="6" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="monospace" opacity="0.7">!</text>
  </g>

  <!-- Lock icon on right node -->
  <g transform="translate(860, 115)" filter="url(#shadow)">
    <rect x="-6" y="-4" width="12" height="10" rx="2" fill="none" stroke="#10b981" stroke-width="2" opacity="0.7"/>
    <path d="M -4,-4 V -8 A 4 4 0 0 1 4,-8 V -4" fill="none" stroke="#10b981" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" letter-spacing="-0.5">Shadow AI</text>
  <text x="600" y="430" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" letter-spacing="-0.3">O uso invisível da IA nas empresas</text>
  
  <!-- Stats bar -->
  <g transform="translate(600, 490)">
    <rect x="-180" y="-30" width="360" height="60" rx="12" fill="rgba(99,102,241,0.12)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-120" y="8" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-transform="uppercase" letter-spacing="1">66% das empresas</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="14" opacity="0.6">|</text>
    <text x="120" y="8" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-transform="uppercase" letter-spacing="1">~60% usam contas pessoais</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" opacity="0.7">Fonte: SAP + Oxford Economics · Gartner</text>
  </g>

  <!-- Badge -->
  <g transform="translate(600, 565)">
    <rect x="-80" y="-14" width="160" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="12" font-weight="500">AH Digital · 15 julho 2026</text>
  </g>
</svg>
