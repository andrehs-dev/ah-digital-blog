<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0720"/>
      <stop offset="50%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines - geometric -->
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="480" x2="1200" y2="480" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Geometric circles -->
  <circle cx="125" cy="140" r="80" fill="none" stroke="#a855f7" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="125" cy="140" r="55" fill="none" stroke="#a855f7" stroke-opacity="0.06" stroke-width="0.5"/>
  <circle cx="1080" cy="500" r="100" fill="none" stroke="#06b6d4" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Diagonal lines accent -->
  <line x1="0" y1="0" x2="200" y2="200" stroke="url(#lineGrad)" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="1000" y1="430" x2="1200" y2="630" stroke="url(#lineGrad)" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Main accent line -->
  <rect x="80" y="200" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Title -->
  <text x="80" y="260" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1.5">IA está projetando</text>
  <text x="80" y="325" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1.5">a <tspan fill="url(#accent)">próxima IA</tspan></text>

  <!-- Subtitle -->
  <text x="80" y="390" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="-0.3">CEO da SoftBank afirma que superinteligência</text>
  <text x="80" y="422" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="-0.3">está a apenas <tspan fill="#a855f7" font-weight="600">2 anos</tspan> de distância</text>

  <!-- Small accent dots -->
  <circle cx="80" cy="470" r="3" fill="#a855f7" opacity="0.6"/>
  <circle cx="90" cy="470" r="3" fill="#a855f7" opacity="0.3"/>

  <!-- Bottom meta -->
  <text x="80" y="550" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#64748b" letter-spacing="1">AH DIGITAL</text>
  <text x="80" y="575" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="300" fill="#475569" letter-spacing="0.5">t e c n o l o g i a  p a r a  n e g ó c i o s</text>

  <!-- Right side decoration - abstract neural-like dots -->
  <g opacity="0.04">
    <circle cx="1050" cy="180" r="2" fill="#a855f7"/>
    <circle cx="1070" cy="160" r="2" fill="#06b6d4"/>
    <circle cx="1090" cy="190" r="2" fill="#a855f7"/>
    <circle cx="1110" cy="170" r="2" fill="#06b6d4"/>
    <circle cx="1130" cy="210" r="2" fill="#a855f7"/>
    <circle cx="1060" cy="210" r="2" fill="#06b6d4"/>
    <circle cx="1100" cy="150" r="2" fill="#a855f7"/>
    <line x1="1050" y1="180" x2="1070" y2="160" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
    <line x1="1070" y1="160" x2="1090" y2="190" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <line x1="1090" y1="190" x2="1110" y2="170" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
    <line x1="1110" y1="170" x2="1130" y2="210" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <line x1="1050" y1="180" x2="1090" y2="190" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
    <line x1="1070" y1="160" x2="1110" y2="170" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>
