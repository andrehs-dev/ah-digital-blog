<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="250" r="300" fill="url(#glow1)"/>
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  <!-- Ícone central: engrenagem + cifrão -->
  <g transform="translate(600, 140)">
    <!-- Engrenagem externa -->
    <circle cx="0" cy="0" r="50" stroke="url(#accent)" stroke-width="3" fill="none"/>
    <circle cx="0" cy="0" r="35" stroke="url(#accent)" stroke-width="2" fill="none" stroke-dasharray="8 6"/>
    <!-- Símbolo cifrão no centro -->
    <text x="0" y="14" font-family="Montserrat, system-ui, sans-serif" font-size="44" font-weight="700" text-anchor="middle" fill="#00d4ff">R$</text>
    <!-- Detalhes engrenagem -->
    <rect x="-4" y="-68" width="8" height="18" rx="3" fill="#7b2ff7" opacity="0.6"/>
    <rect x="-4" y="50" width="8" height="18" rx="3" fill="#7b2ff7" opacity="0.6"/>
    <rect x="-68" y="-4" width="18" height="8" rx="3" fill="#7b2ff7" opacity="0.6"/>
    <rect x="50" y="-4" width="18" height="8" rx="3" fill="#7b2ff7" opacity="0.6"/>
  </g>
  <text x="80" y="320" font-family="Montserrat, system-ui, sans-serif" font-size="46" font-weight="700" fill="#ffffff">
    Como Ganhar Dinheiro
  </text>
  <text x="80" y="370" font-family="Montserrat, system-ui, sans-serif" font-size="36" font-weight="400" fill="#a0a0b8">
    Criando Automações com IA
  </text>
  <text x="80" y="430" font-family="Montserrat, system-ui, sans-serif" font-size="18" fill="#606080">
    n8n · Make · Zapier · Templates · Mensalidade · Consultoria
  </text>
  <!-- Badge -->
  <g transform="translate(840, 480)">
    <rect x="0" y="0" width="220" height="40" rx="20" fill="url(#accent)" opacity="0.3"/>
    <text x="110" y="25" font-family="Montserrat, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#ffffff">
      Guia Completo 2026
    </text>
  </g>
</svg>
