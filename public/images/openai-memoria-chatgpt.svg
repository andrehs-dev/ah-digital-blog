<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#2d0a5c"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
  <!-- Neural network dots and lines -->
  <circle cx="200" cy="180" r="4" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="350" cy="140" r="4" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="500" cy="200" r="4" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="300" cy="280" r="4" fill="#06b6d4" opacity="0.6"/>
  <circle cx="450" cy="320" r="4" fill="#06b6d4" opacity="0.6"/>
  <circle cx="250" cy="380" r="4" fill="#8b5cf6" opacity="0.6"/>
  <line x1="200" y1="180" x2="350" y2="140" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2"/>
  <line x1="350" y1="140" x2="500" y2="200" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="280" x2="450" y2="320" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="180" x2="300" y2="280" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  <!-- Decorative circles -->
  <circle cx="1000" cy="100" r="30" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="500" r="50" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.1"/>
  <!-- AH Logo -->
  <rect x="35" y="30" width="60" height="60" rx="8" fill="url(#accent)" opacity="0.9"/>
  <text x="65" y="70" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="22" fill="#0d1117" text-anchor="middle">AH</text>
  <!-- Tag -->
  <rect x="100" y="40" width="160" height="28" rx="14" fill="#8b5cf6" opacity="0.2"/>
  <text x="180" y="59" font-family="Montserrat, Arial, sans-serif" font-weight="500" font-size="12" fill="#8b5cf6" text-anchor="middle">AH DIGITAL BLOG</text>
  <!-- Category -->
  <rect x="35" y="110" width="100" height="26" rx="13" fill="#06b6d4" opacity="0.2"/>
  <text x="85" y="127" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="11" fill="#06b6d4" text-anchor="middle">🔵 GUIA</text>
  <!-- Date -->
  <text x="980" y="127" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="12" fill="#8b5cf6" opacity="0.5" text-anchor="end">08/06/2026</text>
  <!-- Title -->
  <text x="600" y="250" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="44" fill="#ffffff" text-anchor="middle">ChatGPT Agora Tem</text>
  <text x="600" y="310" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="44" fill="#ffffff" text-anchor="middle">Memória que Aprende</text>
  <!-- Subtitle -->
  <text x="600" y="370" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="20" fill="#a0a0b0" text-anchor="middle">OpenAI lançou arquitetura de "sonhos" — o assistente</text>
  <text x="600" y="395" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="20" fill="#a0a0b0" text-anchor="middle">agora aprende sozinho sem você precisar pedir</text>
  <!-- Accent line -->
  <line x1="450" y1="425" x2="750" y2="425" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom dots -->
  <circle cx="560" cy="550" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="580" cy="550" r="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="600" cy="550" r="3" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="620" cy="550" r="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="640" cy="550" r="3" fill="#8b5cf6" opacity="0.4"/>
</svg>
