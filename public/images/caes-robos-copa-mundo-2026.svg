<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="40%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="robot-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#8b5cf6" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#8b5cf6" stroke-width="0.5" opacity="0.12"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#06b6d4" stroke-width="0.5" opacity="0.12"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#06b6d4" stroke-width="0.5" opacity="0.12"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="80" r="30" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="550" r="50" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.12"/>
  <circle cx="1100" cy="100" r="20" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.12"/>
  
  <!-- Circuit lines -->
  <path d="M0 315 L80 315 L100 295 L250 295 L270 315 L320 315" stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.12"/>
  <path d="M880 315 L920 315 L940 335 L1080 335 L1100 315 L1200 315" stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.12"/>
  
  <!-- Robot silhouette (simplified Spot-like dog shape) -->
  <g transform="translate(900, 200)" opacity="0.08">
    <!-- Body -->
    <rect x="0" y="30" width="80" height="35" rx="8" fill="#ffffff"/>
    <!-- Head -->
    <rect x="80" y="25" width="25" height="25" rx="5" fill="#ffffff"/>
    <!-- Legs -->
    <rect x="8" y="65" width="8" height="30" rx="3" fill="#ffffff" transform="rotate(-5, 12, 65)"/>
    <rect x="22" y="65" width="8" height="30" rx="3" fill="#ffffff" transform="rotate(5, 26, 65)"/>
    <rect x="50" y="65" width="8" height="30" rx="3" fill="#ffffff" transform="rotate(-5, 54, 65)"/>
    <rect x="64" y="65" width="8" height="30" rx="3" fill="#ffffff" transform="rotate(5, 68, 65)"/>
  </g>
  
  <!-- Robot dog simplified wireframe -->
  <g transform="translate(200, 220)" opacity="0.06">
    <rect x="0" y="0" width="60" height="25" rx="5" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="60" y="-5" width="18" height="18" rx="3" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="6" y1="25" x2="6" y2="50" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="16" y1="25" x2="16" y2="50" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="38" y1="25" x2="38" y2="50" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="48" y1="25" x2="48" y2="50" stroke="#06b6d4" stroke-width="1.5"/>
  </g>
  
  <!-- AH Logo -->
  <rect x="35" y="30" width="60" height="60" rx="8" fill="url(#accent)" opacity="0.9"/>
  <text x="65" y="70" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="22" fill="#0d1117" text-anchor="middle">AH</text>
  
  <!-- Tag -->
  <rect x="100" y="40" width="160" height="28" rx="14" fill="#8b5cf6" opacity="0.2"/>
  <text x="180" y="59" font-family="Montserrat, Arial, sans-serif" font-weight="500" font-size="12" fill="#8b5cf6" text-anchor="middle">AH DIGITAL BLOG</text>
  
  <!-- Category -->
  <rect x="35" y="110" width="120" height="26" rx="13" fill="#06b6d4" opacity="0.2"/>
  <text x="95" y="127" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="11" fill="#06b6d4" text-anchor="middle">🤖 AUTOMAÇÃO</text>
  
  <!-- Date -->
  <text x="980" y="127" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="12" fill="#8b5cf6" opacity="0.5" text-anchor="end">08/06/2026</text>
  
  <!-- Main Title -->
  <text x="600" y="230" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="44" fill="#ffffff" text-anchor="middle">Cães-Robôs na Copa</text>
  <text x="600" y="285" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="44" fill="#ffffff" text-anchor="middle">do Mundo 2026</text>
  
  <!-- Subtitle -->
  <text x="600" y="340" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="18" fill="#a0a0b0" text-anchor="middle">Boston Dynamics Spot e Unitree K9-X na segurança dos estádios</text>
  
  <!-- Accent line -->
  <line x1="400" y1="380" x2="800" y2="380" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Stats / highlights -->
  <g transform="translate(350, 430)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#8b5cf6" opacity="0.1"/>
    <text x="70" y="22" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="18" fill="#8b5cf6" text-anchor="middle">4 robôs</text>
    <text x="70" y="40" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="11" fill="#8b5cf6" text-anchor="middle" opacity="0.7">Security Spot</text>
  </g>
  <g transform="translate(530, 430)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#06b6d4" opacity="0.1"/>
    <text x="70" y="22" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="18" fill="#06b6d4" text-anchor="middle">104 jogos</text>
    <text x="70" y="40" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="11" fill="#06b6d4" text-anchor="middle" opacity="0.7">48 seleções</text>
  </g>
  <g transform="translate(710, 430)">
    <rect x="0" y="0" width="140" height="50" rx="8" fill="#8b5cf6" opacity="0.1"/>
    <text x="70" y="22" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="18" fill="#8b5cf6" text-anchor="middle">2 países</text>
    <text x="70" y="40" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="11" fill="#8b5cf6" text-anchor="middle" opacity="0.7">EUA e México</text>
  </g>
  
  <!-- Bottom pulse dots -->
  <circle cx="560" cy="570" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="580" cy="570" r="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="600" cy="570" r="3" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="620" cy="570" r="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="640" cy="570" r="3" fill="#8b5cf6" opacity="0.4"/>
</svg>
