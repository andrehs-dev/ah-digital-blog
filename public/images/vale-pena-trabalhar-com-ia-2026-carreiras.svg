<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="250" r="300" fill="url(#glow1)"/>
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  <!-- Ícone: cérebro digital + seta de crescimento -->
  <g transform="translate(600, 130)">
    <rect x="-45" y="-35" width="90" height="70" rx="12" stroke="url(#accent)" stroke-width="3" fill="none"/>
    <circle cx="-10" cy="-10" r="8" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="10" cy="-10" r="8" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="-10" cy="10" r="8" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="10" cy="10" r="8" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <line x1="-10" y1="-2" x2="-10" y2="2" stroke="#7b2ff7" stroke-width="2"/>
    <line x1="10" y1="-2" x2="10" y2="2" stroke="#7b2ff7" stroke-width="2"/>
    <line x1="-2" y1="-10" x2="2" y2="-10" stroke="#7b2ff7" stroke-width="2"/>
    <line x1="-2" y1="10" x2="2" y2="10" stroke="#7b2ff7" stroke-width="2"/>
    <!-- Seta de crescimento -->
    <polyline points="-55,25 -30,5 -15,15 5,-5 25,15 55,-10" stroke="#00ff88" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="45,-5 55,-10 55,0" stroke="#00ff88" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="600" y="220" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="36" font-weight="700">
    Vale a Pena Trabalhar com IA em 2026?
  </text>
  <text x="600" y="270" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="28" font-weight="400" opacity="0.9">
    Carreiras que Estão Bombando
  </text>
  <text x="600" y="330" text-anchor="middle" fill="#a0a0c0" font-family="system-ui, sans-serif" font-size="16">
    Salários, habilidades e caminhos reais para entrar no mercado
  </text>
  <!-- Linha decorativa -->
  <line x1="400" y1="355" x2="800" y2="355" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  <!-- Tags -->
  <g transform="translate(430, 380)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#00d4ff" fill-opacity="0.15"/>
    <text x="45" y="19" text-anchor="middle" fill="#00d4ff" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Carreira</text>
  </g>
  <g transform="translate(535, 380)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="#7b2ff7" fill-opacity="0.15"/>
    <text x="65" y="19" text-anchor="middle" fill="#7b2ff7" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Inteligência Artificial</text>
  </g>
  <g transform="translate(700, 380)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#00ff88" fill-opacity="0.15"/>
    <text x="50" y="19" text-anchor="middle" fill="#00ff88" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Mercado 2026</text>
  </g>
  <!-- Rodapé -->
  <text x="600" y="590" text-anchor="middle" fill="#404060" font-family="system-ui, sans-serif" font-size="14">
    AH Digital Blog · ah-digital-blog.vercel.app
  </text>
</svg>
