<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00d4ff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)" rx="0"/>

  <!-- Grid pattern subtle -->
  <g opacity="0.03">
    <line x1="0" y1="180" x2="1080" y2="180" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1080" y2="360" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="540" x2="1080" y2="540" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="720" x2="1080" y2="720" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="0" y1="900" x2="1080" y2="900" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="1080" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="1080" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="1080" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="1080" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="1080" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="940" cy="140" r="120" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
  <circle cx="940" cy="140" r="80" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.1"/>
  <circle cx="140" cy="940" r="100" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.12"/>

  <!-- Main Icon - Robot/Gear automation -->
  <g transform="translate(540, 300)" filter="url(#shadow)">
    <!-- Gear icon -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#accent)" stroke-width="6"/>
    <circle cx="0" cy="0" r="40" fill="url(#accent)" opacity="0.15"/>
    <!-- Gear teeth -->
    <g stroke="url(#accent)" stroke-width="8" stroke-linecap="round">
      <line x1="0" y1="-88" x2="0" y2="-72"/>
      <line x1="62" y1="-62" x2="51" y2="-51"/>
      <line x1="88" y1="0" x2="72" y2="0"/>
      <line x1="62" y1="62" x2="51" y2="51"/>
      <line x1="0" y1="88" x2="0" y2="72"/>
      <line x1="-62" y1="62" x2="-51" y2="51"/>
      <line x1="-88" y1="0" x2="-72" y2="0"/>
      <line x1="-62" y1="-62" x2="-51" y2="-51"/>
    </g>
    <!-- Play button center -->
    <polygon points="-15,-8 15,0 -15,8" fill="#00d4ff" filter="url(#glow)"/>
  </g>

  <!-- Main Title -->
  <text x="540" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    AUTOMATIZA├З├ГO
  </text>
  <text x="540" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="normal" fill="#a0a0c0">
    Trabalhe menos. Ganhe mais.
  </text>

  <!-- Subtitle -->
  <text x="540" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#6060a0" letter-spacing="4">
    тФАтФАтФА тЛЖтЛЕтШЖтЛЕтЛЖ тФАтФАтФА
  </text>

  <!-- Automation list items -->
  <g transform="translate(300, 780)" font-family="Arial, sans-serif" font-size="26" fill="#c0c0e0">
    <text x="0" y="0">ЁЯдЦ Postagem em redes sociais</text>
    <text x="0" y="45">ЁЯУз Disparo de e-mails autom├бtico</text>
    <text x="0" y="90">ЁЯУК Relat├│rios inteligentes</text>
  </g>
  <g transform="translate(570, 780)" font-family="Arial, sans-serif" font-size="26" fill="#c0c0e0">
    <text x="0" y="0">ЁЯФе Captura de leads 24h</text>
    <text x="0" y="45">тЬНя╕П Conte├║do com IA</text>
    <text x="0" y="90">тЪб Atendimento automatizado</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="340" y="960" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>

  <!-- Footer -->
  <text x="540" y="1010" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#404070" letter-spacing="3">
    @ANDREHS.DEV
  </text>
</svg>
