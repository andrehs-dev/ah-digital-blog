<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Dot 5ª geração</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 300px;
      height: 250px;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 55%, #083344 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }
    .card {
      width: 280px;
      height: 230px;
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 20px;
      padding: 24px;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      text-align: center;
    }
    .tag {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #22d3ee;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 24px;
      line-height: 1.1;
      margin: 0 0 12px;
    }
    p {
      font-size: 14px;
      line-height: 1.4;
      color: #cbd5e1;
      margin: 0 0 20px;
    }
    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: #7c3aed;
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">Recomendado</div>
    <h1>Echo Dot 5ª geração</h1>
    <p>Automação por voz para sua rotina com Alexa.</p>
    <a href="https://www.amazon.com.br/dp/B09B8VGCR8?tag=ahdigitalblog-20">Ver na Amazon</a>
  </div>
</body>
</html>
