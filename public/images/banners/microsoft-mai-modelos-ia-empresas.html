<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Banner Microsoft MAI</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; }
    .banner {
      width: 300px;
      height: 250px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      color: #f8fafc;
      background: linear-gradient(135deg, #12051f 0%, #1c1040 58%, #061725 100%);
      text-decoration: none;
      border: 1px solid rgba(34, 211, 238, 0.28);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }
    .tag { color: #22d3ee; font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
    h1 { margin: 0; font-size: 27px; line-height: 1.05; letter-spacing: -1px; }
    p { margin: 0; color: #cbd5e1; font-size: 14px; line-height: 1.45; }
    .cta {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      background: #22d3ee;
      color: #07111f;
      font-size: 14px;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <a class="banner" href="https://www.amazon.com.br/dp/B0H21ND813?tag=ahdigitalblog-20" rel="nofollow sponsored">
    <span class="tag">IA para devs</span>
    <div>
      <h1>GitHub Copilot na prática</h1>
      <p>Um livro direto para entender automação de código, testes e documentação com IA.</p>
    </div>
    <span class="cta">Ver na Amazon</span>
  </a>
</body>
</html>
