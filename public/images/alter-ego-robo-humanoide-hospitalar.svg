<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e0533;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67e8f9;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#22d3ee" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/><line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/><line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/><line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/><line x1="0" y1="567" x2="1200" y2="567"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="100" r="130" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.1"/>

  <!-- Decorative lines -->
  <line x1="50" y1="80" x2="350" y2="80" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="84" x2="200" y2="84" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>

  <!-- Small robot icon (simplified) -->
  <g transform="translate(900, 220)" opacity="0.12">
    <!-- Head -->
    <rect x="0" y="0" width="60" height="50" rx="10" fill="#22d3ee"/>
    <!-- Eyes -->
    <circle cx="20" cy="20" r="6" fill="#1e0533"/>
    <circle cx="40" cy="20" r="6" fill="#1e0533"/>
    <!-- Mouth -->
    <rect x="18" y="32" width="24" height="4" rx="2" fill="#1e0533"/>
    <!-- Body -->
    <rect x="10" y="55" width="40" height="60" rx="8" fill="#7c3aed"/>
    <!-- Arms -->
    <rect x="-15" y="60" width="20" height="8" rx="4" fill="#22d3ee"/>
    <rect x="55" y="60" width="20" height="8" rx="4" fill="#22d3ee"/>
    <!-- Wheels -->
    <circle cx="20" cy="130" r="10" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="40" cy="130" r="10" fill="none" stroke="#22d3ee" stroke-width="2"/>
  </g>

  <!-- Main title -->
  <text x="55" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#22d3ee" filter="url(#glow)">
    Alter-Ego
  </text>
  <text x="55" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="600" fill="white">
    O robô humanoide que está
  </text>
  <text x="55" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="600" fill="white">
    ajudando pacientes em
  </text>
  <text x="55" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="600" fill="white">
    hospitais na Itália
  </text>

  <!-- Tag badge -->
  <rect x="55" y="390" width="120" height="30" rx="15" fill="#7c3aed" opacity="0.8"/>
  <text x="115" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">
    ROBÓTICA
  </text>

  <!-- Date -->
  <text x="190" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">
    21/06/2026
  </text>

  <!-- Mini bar chart - healthcare robotics stats -->
  <!-- Soft robotics market growth -->
  <g transform="translate(680, 380)">
    <text x="0" y="-10" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">
      Mercado de robótica soft (% crescimento anual)
    </text>
    <!-- Bar 1: 2022 -->
    <rect x="0" y="0" width="40" height="60" rx="3" fill="url(#bar1)"/>
    <text x="20" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">2022</text>
    <text x="20" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">12%</text>
    <!-- Bar 2: 2024 -->
    <rect x="55" y="0" width="40" height="40" rx="3" fill="url(#bar2)"/>
    <text x="75" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">2024</text>
    <text x="75" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#67e8f9" text-anchor="middle">27%</text>
    <!-- Bar 3: 2026 -->
    <rect x="110" y="-10" width="40" height="50" rx="3" fill="url(#bar3)"/>
    <text x="130" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">2026</text>
    <text x="130" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">41%</text>
    <!-- Source -->
    <text x="0" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">
      Fonte: MarketsandMarkets
    </text>
  </g>

  <!-- Logo AH -->
  <text x="55" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="url(#accent)">
    AH
  </text>
  <text x="90" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#64748b">
    DIGITAL
  </text>

  <!-- Bottom accent line -->
  <line x1="55" y1="570" x2="200" y2="570" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>

  <!-- gradient overlay bottom -->
  <rect x="0" y="570" width="1200" height="60" fill="url(#bg)" opacity="0.3"/>
</svg>