<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed" />
      <stop offset="100%" style="stop-color:#22d3ee" />
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#7c3aed" />
      <stop offset="100%" style="stop-color:#5b21b6" />
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#22d3ee" />
      <stop offset="100%" style="stop-color:#0e7490" />
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#a78bfa" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Grid lines subtle -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="500" x2="1200" y2="500" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="none" stroke="#7c3aed" stroke-opacity="0.08" stroke-width="2" />
  <circle cx="1050" cy="120" r="240" fill="none" stroke="#22d3ee" stroke-opacity="0.04" stroke-width="1" />

  <!-- Decorative lines top -->
  <line x1="60" y1="60" x2="300" y2="60" stroke="url(#accent1)" stroke-width="3" stroke-linecap="round" />

  <!-- Logo AH -->
  <text x="60" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#7c3aed" font-weight="700" letter-spacing="2">AH</text>
  <text x="60" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#22d3ee" letter-spacing="3">DIGITAL</text>

  <!-- Tag -->
  <rect x="60" y="95" width="130" height="28" rx="14" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1" />
  <text x="125" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="600">INTELIGÊNCIA ARTIFICIAL</text>

  <!-- Main Title -->
  <text x="60" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#e2e8f0" font-weight="800">
    Google transforma
  </text>
  <text x="60" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#e2e8f0" font-weight="800">
    celulares antigos
  </text>
  <text x="60" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#22d3ee" font-weight="800">
    em data centers de IA
  </text>

  <!-- Subtitle -->
  <text x="60" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">
    2.000 Pixels descartados viram 50 servidores com Kubernetes
  </text>

  <!-- Mini bar chart (e-waste data) -->
  <g transform="translate(60, 360)">
    <!-- Title -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" font-weight="600" letter-spacing="1">LIXO ELETRÔNICO GLOBAL (Mt)</text>

    <!-- Bar 1 - 2022 -->
    <rect x="0" y="15" width="100" height="20" rx="3" fill="url(#bar1)" />
    <text x="0" y="13" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">2022</text>
    <text x="108" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0" font-weight="700">62 Mt</text>

    <!-- Bar 2 - 2026 -->
    <rect x="0" y="45" width="140" height="20" rx="3" fill="url(#bar2)" />
    <text x="0" y="43" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">2026 (proj.)</text>
    <text x="148" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0" font-weight="700">~72 Mt</text>

    <!-- Bar 3 - 2030 -->
    <rect x="0" y="75" width="165" height="20" rx="3" fill="url(#bar3)" />
    <text x="0" y="73" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">2030 (proj.)</text>
    <text x="173" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0" font-weight="700">82 Mt</text>

    <!-- Source -->
    <text x="0" y="117" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#475569">Fonte: ONU / Global E-waste Monitor</text>
  </g>

  <!-- Right side: phone icon cluster -->
  <g transform="translate(720, 140)">
    <!-- Phone icon 1 -->
    <rect x="0" y="0" width="55" height="100" rx="8" fill="none" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1.5" />
    <rect x="12" y="8" width="31" height="55" rx="2" fill="#7c3aed" fill-opacity="0.08" />
    <circle cx="27" cy="80" r="5" fill="none" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1" />
    <line x1="15" y1="3" x2="40" y2="3" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1.5" />

    <!-- Phone icon 2 (offset) -->
    <rect x="65" y="20" width="55" height="100" rx="8" fill="none" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1.5" />
    <rect x="77" y="28" width="31" height="55" rx="2" fill="#7c3aed" fill-opacity="0.08" />
    <circle cx="92" cy="100" r="5" fill="none" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1" />
    <line x1="80" y1="23" x2="105" y2="23" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1.5" />

    <!-- Phone icon 3 -->
    <rect x="130" y="-10" width="55" height="100" rx="8" fill="none" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1.5" />
    <rect x="142" y="-2" width="31" height="55" rx="2" fill="#22d3ee" fill-opacity="0.08" />
    <circle cx="157" cy="70" r="5" fill="none" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="1" />
    <line x1="145" y1="-7" x2="170" y2="-7" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1.5" />

    <!-- Connecting lines (network) -->
    <line x1="55" y1="50" x2="65" y2="60" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="1" />
    <line x1="120" y1="60" x2="130" y2="45" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="1" />

    <!-- Cluster label -->
    <text x="92" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Cluster com</text>
    <text x="92" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle" font-weight="700">25-50 Pixels</text>
    <text x="92" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">= 1 servidor</text>
  </g>

  <!-- Bottom line -->
  <line x1="60" y1="570" x2="500" y2="570" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1" />
  <text x="60" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">ahdigital.com.br</text>
  <text x="600" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">19 de junho de 2026</text>
</svg>
