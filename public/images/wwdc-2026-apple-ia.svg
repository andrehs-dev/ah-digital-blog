<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#2d0a5c"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <circle cx="1100" cy="530" r="60" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.15"/>
  <circle cx="950" cy="80" r="25" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  <!-- Circuit lines -->
  <path d="M0 315 L100 315 L120 295 L280 295 L300 315 L350 315" stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M850 315 L900 315 L920 335 L1100 335 L1120 315 L1200 315" stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.15"/>
  <!-- AH Logo -->
  <rect x="35" y="30" width="60" height="60" rx="8" fill="url(#accent)" opacity="0.9"/>
  <text x="65" y="70" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="22" fill="#0d1117" text-anchor="middle">AH</text>
  <!-- Tag -->
  <rect x="100" y="40" width="160" height="28" rx="14" fill="#8b5cf6" opacity="0.2"/>
  <text x="180" y="59" font-family="Montserrat, Arial, sans-serif" font-weight="500" font-size="12" fill="#8b5cf6" text-anchor="middle">AH DIGITAL BLOG</text>
  <!-- Category -->
  <rect x="35" y="110" width="100" height="26" rx="13" fill="#06b6d4" opacity="0.2"/>
  <text x="85" y="127" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="11" fill="#06b6d4" text-anchor="middle">🔴 NOTÍCIA</text>
  <!-- Date -->
  <text x="980" y="127" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="12" fill="#8b5cf6" opacity="0.5" text-anchor="end">08/06/2026</text>
  <!-- Main Title -->
  <text x="600" y="250" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="48" fill="#ffffff" text-anchor="middle">WWDC 2026: Apple</text>
  <text x="600" y="310" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="48" fill="#ffffff" text-anchor="middle">Aposta Tudo na IA</text>
  <!-- Subtitle -->
  <text x="600" y="370" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="20" fill="#a0a0b0" text-anchor="middle">Siri inteligente, iOS 27 e o adeus de Tim Cook</text>
  <!-- Accent line -->
  <line x1="450" y1="400" x2="750" y2="400" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom dots -->
  <circle cx="560" cy="560" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="580" cy="560" r="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="600" cy="560" r="3" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="620" cy="560" r="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="640" cy="560" r="3" fill="#8b5cf6" opacity="0.4"/>
</svg>
