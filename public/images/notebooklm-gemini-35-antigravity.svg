<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1b3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002244;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70" />
    <line x1="0" y1="140" x2="1200" y2="140" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="280" x2="1200" y2="280" />
    <line x1="0" y1="350" x2="1200" y2="350" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="490" x2="1200" y2="490" />
    <line x1="0" y1="560" x2="1200" y2="560" />
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="550" r="120" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.08" />
  <circle cx="1100" cy="100" r="80" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.08" />

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" />

  <!-- Logo area -->
  <text x="40" y="50" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#7c3aed" letter-spacing="1">AH</text>
  <text x="68" y="50" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="300" fill="#64748b" letter-spacing="0.5">Digital</text>

  <!-- Tag -->
  <rect x="40" y="75" width="140" height="28" rx="14" fill="#7c3aed" opacity="0.25" />
  <text x="110" y="93" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle" letter-spacing="1">INTELIGÊNCIA ARTIFICIAL</text>

  <!-- Title -->
  <text x="40" y="160" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-0.5">
    NotebookLM vira
  </text>
  <text x="40" y="210" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-0.5">
    Assistente Definitivo
  </text>

  <!-- Gradient underline -->
  <rect x="40" y="225" width="200" height="3" rx="1.5" fill="url(#accent)" />

  <!-- Subtitle -->
  <text x="40" y="270" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" font-weight="400" fill="#94a3b8" letter-spacing="0.3">
    Gemini 3.5 + Antigravity
  </text>
  <text x="40" y="298" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="16" font-weight="300" fill="#64748b" letter-spacing="0.3">
    PDF · Excel · PowerPoint · Gráficos · CSV
  </text>

  <!-- Mini chart mockup - right side -->
  <g transform="translate(700, 100)">
    <!-- Chart background -->
    <rect x="0" y="0" width="420" height="260" rx="12" fill="#1e293b" opacity="0.6" />
    <rect x="0" y="0" width="420" height="40" rx="12" fill="#1e293b" opacity="0.8" />
    <rect x="0" y="20" width="420" height="20" fill="#1e293b" opacity="0.8" />

    <!-- Chart title -->
    <text x="210" y="26" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">DESEMPENHO NOTEBOOKLM</text>

    <!-- Y axis label -->
    <text x="25" y="75" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8" fill="#475569" text-anchor="end">100%</text>
    <text x="25" y="115" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8" fill="#475569" text-anchor="end">75%</text>
    <text x="25" y="155" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8" fill="#475569" text-anchor="end">50%</text>
    <text x="25" y="195" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8" fill="#475569" text-anchor="end">25%</text>

    <!-- Grid lines chart -->
    <line x1="35" y1="72" x2="400" y2="72" stroke="#334155" stroke-width="0.5" />
    <line x1="35" y1="112" x2="400" y2="112" stroke="#334155" stroke-width="0.5" />
    <line x1="35" y1="152" x2="400" y2="152" stroke="#334155" stroke-width="0.5" />
    <line x1="35" y1="192" x2="400" y2="192" stroke="#334155" stroke-width="0.5" />

    <!-- Bar 1: Document Analysis 69.9% -->
    <rect x="60" y="88" width="70" height="104" rx="3" fill="url(#bar1)" />
    <text x="95" y="80" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">69.9%</text>
    <text x="95" y="205" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Análise Documentos</text>

    <!-- Bar 2: Web Research 78.2% -->
    <rect x="165" y="60" width="70" height="132" rx="3" fill="url(#bar2)" />
    <text x="200" y="52" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#22d3ee" text-anchor="middle">78.2%</text>
    <text x="200" y="205" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Pesquisa Web</text>

    <!-- Bar 3: Average Win Rate 65% -->
    <rect x="270" y="110" width="70" height="82" rx="3" fill="url(#bar3)" />
    <text x="305" y="102" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">65%</text>
    <text x="305" y="205" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Média Geral</text>
  </g>

  <!-- Output format icons - bottom left -->
  <g transform="translate(40, 340)">
    <text x="0" y="0" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="1">FORMATOS DE EXPORTAÇÃO</text>

    <!-- Format chips -->
    <rect x="0" y="15" width="55" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="27" y="31" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">PDF</text>

    <rect x="62" y="15" width="55" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="89" y="31" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">DOCX</text>

    <rect x="124" y="15" width="55" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="151" y="31" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">XLSX</text>

    <rect x="186" y="15" width="55" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="213" y="31" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">PPTX</text>

    <rect x="248" y="15" width="55" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="275" y="31" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">CSV</text>

    <rect x="310" y="15" width="55" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="337" y="31" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">JSON</text>

    <rect x="372" y="15" width="55" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="399" y="31" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">PNG</text>

    <rect x="434" y="15" width="55" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="461" y="31" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">SVG</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="40" y1="420" x2="550" y2="420" stroke="#334155" stroke-width="1" opacity="0.5" />

  <!-- Description text -->
  <text x="40" y="450" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="13" font-weight="300" fill="#475569">
    Análise de dados · Relatórios · Apresentações · Pesquisa automática
  </text>

  <!-- Date -->
  <text x="40" y="530" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="12" font-weight="400" fill="#475569" letter-spacing="0.5">
    09.06.2026
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)" />
</svg>
