<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0c0a2c"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Cadeado / escudo estilizado -->
  <circle cx="600" cy="230" r="100" fill="none" stroke="url(#shield)" stroke-width="4" opacity="0.15"/>
  <circle cx="600" cy="230" r="80" fill="none" stroke="url(#shield)" stroke-width="2" opacity="0.25"/>
  
  <!-- Ícone de escudo com cadeado -->
  <g transform="translate(560, 190)">
    <!-- Escudo -->
    <path d="M0 0 L40 0 L40 20 Q40 40 20 50 Q0 40 0 20 Z" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <!-- Cadeado -->
    <rect x="12" y="15" width="16" height="12" rx="2" fill="#8b5cf6"/>
    <path d="M16 15 L16 10 Q16 5 20 5 Q24 5 24 10 L24 15" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="20" cy="22" r="2.5" fill="#60a5fa"/>
    <!-- Check mark -->
    <path d="M14 21 L18 25 L26 17" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Título -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#f1f5f9">
    Senha Forte, MFA
  </text>
  <text x="600" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#f1f5f9">
    e Outras Práticas
  </text>
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="400" fill="#60a5fa">
    que Toda Empresa Devia Ter
  </text>

  <!-- Linha decorativa -->
  <line x1="400" y1="470" x2="800" y2="470" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>

  <!-- Tags/Keywords -->
  <text x="600" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">
    segurança da informação · autenticação multifator · PME · cibersegurança
  </text>

  <!-- ícones decorativos de senha -->
  <g transform="translate(200, 530)" opacity="0.15">
    <rect x="0" y="0" width="30" height="20" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="15" cy="10" r="4" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <g transform="translate(970, 530)" opacity="0.15">
    <rect x="0" y="0" width="30" height="20" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="15" cy="10" r="4" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
</svg>
